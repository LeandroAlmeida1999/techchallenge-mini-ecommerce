services:
  api:
    environment:
      # O broker Strimzi fica exposto localmente via kubectl port-forward na porta 32092.
      KafkaSettings__SectionName: Kafka
      Kafka__BootstrapServers: host.docker.internal:32092
      Kafka__Topic: pedido
      Kafka__ClientId: ecommerce-api

  worker:
    environment:
      # O broker Strimzi fica exposto localmente via kubectl port-forward na porta 32092.
      KafkaSettings__SectionName: Kafka
      Kafka__BootstrapServers: host.docker.internal:32092
      Kafka__Topic: pedido
      Kafka__ClientId: ecommerce-worker
      Kafka__SecurityProtocol: Plaintext
      # Descomente e preencha se o ambiente externo exigir autenticacao.
      # Kafka__SaslMechanism: SCRAM-SHA-512
      # Kafka__SaslUsername: seu-usuario
      # Kafka__SaslPassword: sua-senha
      # Kafka__EnableSslCertificateVerification: true
